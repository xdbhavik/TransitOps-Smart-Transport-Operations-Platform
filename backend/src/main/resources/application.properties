spring.application.name=TransitOps

# Server
server.port=${SERVER_PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/TransitDB?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL init
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET:9f8a7b6c5d4e3f2g1h0i9j8k7l6m5n4o}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Seed data
app.seed.enabled=${APP_SEED_ENABLED:true}

# License expiry reminder
app.license-reminder.enabled=${APP_LICENSE_REMINDER_ENABLED:true}
app.license-reminder.days-before-expiry=${APP_LICENSE_REMINDER_DAYS_BEFORE_EXPIRY:30}
app.license-reminder.cron=${APP_LICENSE_REMINDER_CRON:0 0 8 * * *}

# Mail mode: log = local validation without SMTP, smtp = real email server
app.mail.mode=${APP_MAIL_MODE:log}

# Mail settings (configure for your SMTP server)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

# CORS for frontend integration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
